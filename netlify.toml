# Netlify config for CenServe marketing site (static HTML only — no Python)
# Base directory = site/ so Netlify never sees requirements.txt and won't run pip
[build]
  base = "site"
  publish = "."
  command = ""

# Optional: redirect root to index for SPA-style routing (not needed for single index.html)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
